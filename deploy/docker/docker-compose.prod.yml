name: adrian-zephyr-notes

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", 'pg_isready -U "$${POSTGRES_USER}" -d "$${POSTGRES_DB}"']
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build:
      context: ../..
      dockerfile: apps/server/Dockerfile
      args:
        NPM_CONFIG_REGISTRY: ${PNPM_REGISTRY:-https://registry.npmmirror.com}
    restart: unless-stopped
    environment:
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:?POSTGRES_USER is required}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:?POSTGRES_DB is required}?schema=public
      FRONTEND_ORIGIN: https://${WEBSITE_HOST:?WEBSITE_HOST is required}
      ADMIN_FRONTEND_ORIGIN: https://${ADMIN_HOST:?ADMIN_HOST is required}
      SESSION_COOKIE_DOMAIN: ${SESSION_COOKIE_DOMAIN:-}
      OSS_REGION: ${OSS_REGION:-}
      OSS_BUCKET: ${OSS_BUCKET:-}
      OSS_PUBLIC_BASE_URL: ${OSS_PUBLIC_BASE_URL:-}
      OSS_INTERNAL: ${OSS_INTERNAL:-false}
      ALIBABA_CLOUD_ECS_METADATA: ${ALIBABA_CLOUD_ECS_METADATA:-}
      ADMIN_GITHUB_LOGINS: ${ADMIN_GITHUB_LOGINS:?ADMIN_GITHUB_LOGINS is required}
      GITHUB_OAUTH_CLIENT_ID: ${GITHUB_OAUTH_CLIENT_ID:?GITHUB_OAUTH_CLIENT_ID is required}
      GITHUB_OAUTH_CLIENT_SECRET: ${GITHUB_OAUTH_CLIENT_SECRET:?GITHUB_OAUTH_CLIENT_SECRET is required}
      GITHUB_OAUTH_CALLBACK_URL: https://${WEBSITE_HOST:?WEBSITE_HOST is required}/api/auth/github/callback
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_PROVIDER: ${LLM_PROVIDER:-minimax}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.minimaxi.com/v1}
      LLM_MODEL: ${LLM_MODEL:-MiniMax-M3}
      LLM_TIMEOUT_MS: ${LLM_TIMEOUT_MS:-60000}
      LANGGRAPH_CHECKPOINT_SCHEMA: ${LANGGRAPH_CHECKPOINT_SCHEMA:-public}
      LANGGRAPH_CHECKPOINT_SETUP_ON_START: ${LANGGRAPH_CHECKPOINT_SETUP_ON_START:-false}
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "./node_modules/.bin/prisma migrate deploy --config prisma.config.ts && node dist/main.js"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3001/"]
      interval: 10s
      timeout: 5s
      retries: 12

  website:
    build:
      context: ../..
      dockerfile: apps/website/Dockerfile
      args:
        NPM_CONFIG_REGISTRY: ${PNPM_REGISTRY:-https://registry.npmmirror.com}
        BACKEND_API_BASE_URL: http://server:3001
    restart: unless-stopped
    environment:
      BACKEND_API_BASE_URL: http://server:3001
      ARTICLE_API_BASE_URL: http://server:3001
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3002/"]
      interval: 10s
      timeout: 5s
      retries: 12

  admin:
    build:
      context: ../..
      dockerfile: apps/admin/Dockerfile
      args:
        NPM_CONFIG_REGISTRY: ${PNPM_REGISTRY:-https://registry.npmmirror.com}
        VITE_BACKEND_API_BASE_URL: ${ADMIN_BACKEND_API_BASE_URL:-}
    restart: unless-stopped
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/"]
      interval: 10s
      timeout: 5s
      retries: 12

  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    environment:
      WEBSITE_HOST: ${WEBSITE_HOST:?WEBSITE_HOST is required}
      ADMIN_HOST: ${ADMIN_HOST:?ADMIN_HOST is required}
      ACME_EMAIL: ${ACME_EMAIL:?ACME_EMAIL is required}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      website:
        condition: service_started
      admin:
        condition: service_started
      server:
        condition: service_healthy

volumes:
  postgres-data:
  caddy-data:
  caddy-config:
